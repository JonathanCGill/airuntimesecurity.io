name: Biweekly News Research

on:
  schedule:
    # Runs every other Monday at 09:00 UTC (weeks 1, 3, 5, ...)
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check if this is a biweekly run
        id: biweekly
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            WEEK=$(date +%V)
            if [ $((WEEK % 2)) -eq 1 ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: actions/checkout@v6
        if: steps.biweekly.outputs.should_run == 'true'
        with:
          fetch-depth: 0

      - name: Set branch name
        if: steps.biweekly.outputs.should_run == 'true'
        id: branch
        run: echo "name=news/roundup-$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        if: steps.biweekly.outputs.should_run == 'true'
        run: |
          git checkout -b "${{ steps.branch.outputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Claude Code
        if: steps.biweekly.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run news research
        if: steps.biweekly.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.Anthropic }}
        run: |
          claude -p "$(cat .claude/news-research.md)" \
            --allowedTools "WebSearch" \
            --allowedTools "WebFetch" \
            --allowedTools "Read" \
            --allowedTools "Edit" \
            --allowedTools "Write" \
            --model claude-sonnet-4-6

      - name: Commit, push, and create PR
        if: steps.biweekly.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add docs/news.md
          git commit -m "news: add biweekly AI runtime security roundup $(date +%Y-%m-%d)"
          git push -u origin "${{ steps.branch.outputs.name }}"
          gh pr create \
            --title "News: biweekly AI runtime security roundup $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          ## Summary

          - Automated biweekly news research run
          - Adds recent AI runtime security news items to `docs/news.md`
          - Each item is mapped to relevant AIRS framework controls

          ## Review checklist

          - [ ] News items are accurate and sourced
          - [ ] Framework tags and links are correct
          - [ ] Writing tone matches the site

          EOF
          )" \
            --base main
