name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git-revision-date-localized can read it

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system deps for social card rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev

      - name: Install dependencies
        run: |
          pip install "mkdocs>=1.6,<2"
          pip install "mkdocs-material[imaging]"
          pip install mkdocs-with-pdf
          pip install mkdocs-git-revision-date-localized-plugin

      - name: Generate MASO PDF
        run: mkdocs build -f mkdocs-pdf.yml

      - name: Copy generated PDF to docs
        run: cp site-pdf/pdf/MASO-Framework.pdf docs/Downloads/MASO-Framework.pdf

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
