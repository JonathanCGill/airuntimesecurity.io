<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bgGrad)"/>

  <!-- Scanline grid effect -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="20" x2="1200" y2="20"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="140" x2="1200" y2="140"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="220" x2="1200" y2="220"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="260" x2="1200" y2="260"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="340" x2="1200" y2="340"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="380" x2="1200" y2="380"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="460" x2="1200" y2="460"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="580" x2="1200" y2="580"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="620" x2="1200" y2="620"/><line x1="0" y1="640" x2="1200" y2="640"/>
    <line x1="0" y1="660" x2="1200" y2="660"/>
  </g>

  <!-- ==================== -->
  <!-- SINGLE CHATBOT SECTION -->
  <!-- ==================== -->

  <!-- Section header -->
  <text x="600" y="52" text-anchor="middle" fill="#667788" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" letter-spacing="3">-- SINGLE CHATBOT SECURITY --</text>
  <line x1="250" y1="62" x2="950" y2="62" stroke="#667788" stroke-width="0.5" opacity="0.4"/>

  <!-- Single chatbot flow boxes -->
  <!-- USER (left) -->
  <rect x="80" y="90" width="120" height="50" rx="4" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="140" y="120" text-anchor="middle" fill="#4a90d9" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14" font-weight="bold">USER</text>

  <!-- Arrow USER -> GUARDRAIL -->
  <line x1="200" y1="115" x2="275" y2="115" stroke="#4a90d9" stroke-width="1.5" opacity="0.6"/>
  <text x="237" y="110" text-anchor="middle" fill="#4a90d9" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- GUARDRAIL -->
  <rect x="275" y="90" width="160" height="50" rx="4" fill="none" stroke="#92fe9d" stroke-width="1.5"/>
  <text x="355" y="120" text-anchor="middle" fill="#92fe9d" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14" font-weight="bold">GUARDRAIL</text>

  <!-- Arrow GUARDRAIL -> LLM -->
  <line x1="435" y1="115" x2="510" y2="115" stroke="#92fe9d" stroke-width="1.5" opacity="0.6"/>
  <text x="472" y="110" text-anchor="middle" fill="#92fe9d" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- LLM -->
  <rect x="510" y="90" width="120" height="50" rx="4" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="570" y="120" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14" font-weight="bold">LLM</text>

  <!-- Arrow LLM -> JUDGE -->
  <line x1="630" y1="115" x2="705" y2="115" stroke="#ff6b35" stroke-width="1.5" opacity="0.6"/>
  <text x="667" y="110" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- JUDGE -->
  <rect x="705" y="90" width="120" height="50" rx="4" fill="none" stroke="#f093fb" stroke-width="1.5"/>
  <text x="765" y="120" text-anchor="middle" fill="#f093fb" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14" font-weight="bold">JUDGE</text>

  <!-- Arrow JUDGE -> USER -->
  <line x1="825" y1="115" x2="900" y2="115" stroke="#f093fb" stroke-width="1.5" opacity="0.6"/>
  <text x="862" y="110" text-anchor="middle" fill="#f093fb" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- USER (right) -->
  <rect x="900" y="90" width="120" height="50" rx="4" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="960" y="120" text-anchor="middle" fill="#4a90d9" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14" font-weight="bold">USER</text>

  <!-- Dimmed label -->
  <text x="600" y="175" text-anchor="middle" fill="#445566" font-family="'Roboto Mono', 'Courier New', monospace" font-size="11" letter-spacing="1">Linear chain. Single trust boundary. Single point of failure.</text>

  <!-- ===================== -->
  <!-- DIVIDER -->
  <!-- ===================== -->
  <line x1="100" y1="205" x2="1100" y2="205" stroke="#ff6b35" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ==================== -->
  <!-- MASO SECTION -->
  <!-- ==================== -->

  <!-- Section header -->
  <text x="600" y="240" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold" letter-spacing="3">-- MULTI-AGENT SECURITY OPERATIONS (MASO) --</text>
  <line x1="200" y1="250" x2="1000" y2="250" stroke="#ff6b35" stroke-width="0.5" opacity="0.4"/>

  <!-- ===== TOP ROW: Agent pipeline ===== -->

  <!-- USER -->
  <rect x="55" y="280" width="130" height="55" rx="4" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="120" y="313" text-anchor="middle" fill="#4a90d9" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14" font-weight="bold">USER</text>

  <!-- Arrow -->
  <line x1="185" y1="307" x2="270" y2="307" stroke="#4a90d9" stroke-width="1.5" opacity="0.6"/>
  <text x="227" y="302" text-anchor="middle" fill="#4a90d9" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- GATEKEEPER_AGENT -->
  <rect x="270" y="280" width="220" height="55" rx="4" fill="none" stroke="#00c9ff" stroke-width="1.5"/>
  <text x="380" y="313" text-anchor="middle" fill="#00c9ff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold">GATEKEEPER_AGENT</text>

  <!-- Arrow -->
  <line x1="490" y1="307" x2="565" y2="307" stroke="#00c9ff" stroke-width="1.5" opacity="0.6"/>
  <text x="527" y="302" text-anchor="middle" fill="#00c9ff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- PLANNING_AGENT -->
  <rect x="565" y="280" width="210" height="55" rx="4" fill="none" stroke="#92fe9d" stroke-width="1.5"/>
  <text x="670" y="313" text-anchor="middle" fill="#92fe9d" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold">PLANNING_AGENT</text>

  <!-- Arrow -->
  <line x1="775" y1="307" x2="850" y2="307" stroke="#92fe9d" stroke-width="1.5" opacity="0.6"/>
  <text x="812" y="302" text-anchor="middle" fill="#92fe9d" font-family="'Roboto Mono', 'Courier New', monospace" font-size="14">--&gt;</text>

  <!-- EXECUTOR_AGENT -->
  <rect x="850" y="280" width="210" height="55" rx="4" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="955" y="313" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold">EXECUTOR_AGENT</text>

  <!-- ===== VERTICAL CONNECTORS ===== -->

  <!-- Pipe from GATEKEEPER down -->
  <line x1="380" y1="335" x2="380" y2="380" stroke="#00c9ff" stroke-width="1.5" opacity="0.5"/>
  <text x="380" y="370" text-anchor="middle" fill="#00c9ff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">|</text>
  <text x="380" y="382" text-anchor="middle" fill="#00c9ff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">V</text>

  <!-- Pipe from PLANNING down -->
  <line x1="670" y1="335" x2="670" y2="380" stroke="#92fe9d" stroke-width="1.5" opacity="0.5"/>
  <text x="670" y="370" text-anchor="middle" fill="#92fe9d" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">|</text>
  <text x="670" y="382" text-anchor="middle" fill="#92fe9d" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">V</text>

  <!-- Pipe from EXECUTOR down -->
  <line x1="955" y1="335" x2="955" y2="380" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <text x="955" y="370" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">|</text>
  <text x="955" y="382" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">V</text>

  <!-- ===== MASO HUB ROW ===== -->

  <!-- MASO HUB 1 (Gatekeeper) -->
  <rect x="280" y="390" width="200" height="130" rx="6" fill="#0d1225" stroke="#00c9ff" stroke-width="1.5"/>
  <rect x="280" y="390" width="200" height="3" rx="1" fill="#00c9ff"/>
  <text x="380" y="418" text-anchor="middle" fill="#ffffff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold">MASO HUB</text>
  <line x1="310" y1="428" x2="450" y2="428" stroke="#334455" stroke-width="0.5"/>
  <text x="380" y="450" text-anchor="middle" fill="#f093fb" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">Judge</text>
  <text x="380" y="475" text-anchor="middle" fill="#ff4444" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">Kill_Switch</text>
  <text x="380" y="500" text-anchor="middle" fill="#667788" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">OISpec | Guardrails</text>

  <!-- MASO HUB 2 (Planning) -->
  <rect x="570" y="390" width="200" height="130" rx="6" fill="#0d1225" stroke="#92fe9d" stroke-width="1.5"/>
  <rect x="570" y="390" width="200" height="3" rx="1" fill="#92fe9d"/>
  <text x="670" y="418" text-anchor="middle" fill="#ffffff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold">MASO HUB</text>
  <line x1="600" y1="428" x2="740" y2="428" stroke="#334455" stroke-width="0.5"/>
  <text x="670" y="450" text-anchor="middle" fill="#f093fb" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">Judge</text>
  <text x="670" y="475" text-anchor="middle" fill="#ffaa00" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">IAM_Check</text>
  <text x="670" y="500" text-anchor="middle" fill="#667788" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">OISpec | Guardrails</text>

  <!-- MASO HUB 3 (Executor) -->
  <rect x="855" y="390" width="200" height="130" rx="6" fill="#0d1225" stroke="#ff6b35" stroke-width="1.5"/>
  <rect x="855" y="390" width="200" height="3" rx="1" fill="#ff6b35"/>
  <text x="955" y="418" text-anchor="middle" fill="#ffffff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="13" font-weight="bold">MASO HUB</text>
  <line x1="885" y1="428" x2="1025" y2="428" stroke="#334455" stroke-width="0.5"/>
  <text x="955" y="450" text-anchor="middle" fill="#f093fb" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">Judge</text>
  <text x="955" y="475" text-anchor="middle" fill="#00c9ff" font-family="'Roboto Mono', 'Courier New', monospace" font-size="12">Tool_Check</text>
  <text x="955" y="500" text-anchor="middle" fill="#667788" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">OISpec | Guardrails</text>

  <!-- ===== CONTROL PLANE CONNECTIONS ===== -->

  <!-- Connection Hub1 <-> Hub2 -->
  <line x1="480" y1="455" x2="570" y2="455" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="525" y="448" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="8" letter-spacing="1">CONTROL_PLANE</text>

  <!-- Connection Hub2 <-> Hub3 -->
  <line x1="770" y1="455" x2="855" y2="455" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="812" y="448" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="8" letter-spacing="1">CONTROL_PLANE</text>

  <!-- Arrow decorations on control plane -->
  <text x="485" y="460" text-anchor="start" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">&lt;</text>
  <text x="562" y="460" text-anchor="end" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">&gt;</text>
  <text x="775" y="460" text-anchor="start" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">&lt;</text>
  <text x="850" y="460" text-anchor="end" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="10">&gt;</text>

  <!-- ===== BOTTOM ANNOTATION ===== -->
  <line x1="100" y1="555" x2="1100" y2="555" stroke="#334455" stroke-width="0.5" opacity="0.4"/>

  <text x="600" y="585" text-anchor="middle" fill="#667788" font-family="'Roboto Mono', 'Courier New', monospace" font-size="11" letter-spacing="1">Every agent gets its own judge. Every hub enforces independently.</text>
  <text x="600" y="605" text-anchor="middle" fill="#667788" font-family="'Roboto Mono', 'Courier New', monospace" font-size="11" letter-spacing="1">No agent polices itself. The control plane coordinates. PACE degrades gracefully.</text>

  <!-- Decorative prompt cursor -->
  <text x="600" y="645" text-anchor="middle" fill="#ff6b35" font-family="'Roboto Mono', 'Courier New', monospace" font-size="11" opacity="0.5">maso@control-plane:~$ _</text>
</svg>