<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="Inter, Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
  </defs>

  <rect width="920" height="520" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" letter-spacing="2">PROGRESSIVE CONTROL STACKING</text>
  <text x="460" y="50" text-anchor="middle" fill="#ff6b35" font-size="10" letter-spacing="1">CONTROLS ARE CUMULATIVE: EACH TIER ADDS TO THE TIER BELOW</text>
  <line x1="100" y1="60" x2="820" y2="60" stroke="#ff6b35" stroke-width="0.6" opacity="0.4"/>

  <!-- Base: NONE tier -->
  <rect x="60" y="420" width="800" height="55" rx="6" fill="#0d1225" stroke="#27ae60" stroke-width="1.2"/>
  <rect x="60" y="420" width="800" height="4" rx="2" fill="#27ae60"/>
  <text x="80" y="445" fill="#27ae60" font-size="12" font-weight="700">NONE</text>
  <text x="160" y="445" fill="#8899aa" font-size="10">Usage policies</text>
  <text x="160" y="462" fill="#667" font-size="9">No runtime controls. Standard IT governance only.</text>
  <text x="700" y="452" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="600">Public info bots, content suggestions</text>

  <!-- LOW tier -->
  <rect x="60" y="355" width="800" height="55" rx="6" fill="#0d1225" stroke="#2ecc71" stroke-width="1.2"/>
  <rect x="60" y="355" width="800" height="4" rx="2" fill="#2ecc71"/>
  <text x="80" y="380" fill="#2ecc71" font-size="12" font-weight="700">LOW</text>
  <text x="160" y="375" fill="#2ecc71" font-size="10" font-weight="600">+ Basic guardrails</text>
  <text x="160" y="390" fill="#8899aa" font-size="9">Input filtering | Basic content policy | Rate limiting | 90-day metadata logs</text>
  <text x="160" y="403" fill="#667" font-size="9">Blocks obvious bad input. Logs what happened.</text>
  <text x="700" y="387" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">Internal Q&amp;A, code assist, summarisation</text>

  <!-- MEDIUM tier -->
  <rect x="60" y="280" width="800" height="65" rx="6" fill="#0d1225" stroke="#f39c12" stroke-width="1.2"/>
  <rect x="60" y="280" width="800" height="4" rx="2" fill="#f39c12"/>
  <text x="80" y="305" fill="#f39c12" font-size="12" font-weight="700">MEDIUM</text>
  <text x="160" y="300" fill="#f39c12" font-size="10" font-weight="600">+ Judge evaluation (batch, 5-10%)</text>
  <text x="160" y="315" fill="#8899aa" font-size="9">Standard injection detection | PII warn | Full I/O logging (1 yr) | Exception-based HITL</text>
  <text x="160" y="330" fill="#667" font-size="9">An independent model reviews a sample of outputs. Humans see exceptions.</text>
  <text x="700" y="312" text-anchor="middle" fill="#f39c12" font-size="9" font-weight="600">Document drafting, content generation</text>

  <!-- HIGH tier -->
  <rect x="60" y="195" width="800" height="75" rx="6" fill="#0d1225" stroke="#e67e22" stroke-width="1.2"/>
  <rect x="60" y="195" width="800" height="4" rx="2" fill="#e67e22"/>
  <text x="80" y="220" fill="#e67e22" font-size="12" font-weight="700">HIGH</text>
  <text x="160" y="215" fill="#e67e22" font-size="10" font-weight="600">+ Near real-time Judge (20-50%) + systematic HITL</text>
  <text x="160" y="230" fill="#8899aa" font-size="9">Enhanced + ML guardrails | PII block | Grounding checks | 4h review SLA | 3-yr logs</text>
  <text x="160" y="245" fill="#8899aa" font-size="9">Art. 9 risk management | Art. 12 record-keeping | Art. 13 transparency | Art. 14 human oversight</text>
  <text x="160" y="258" fill="#667" font-size="9">Judge reviews a significant share of traffic. Every flagged item reaches a human reviewer.</text>
  <text x="700" y="237" text-anchor="middle" fill="#e67e22" font-size="9" font-weight="600">Customer service, HR, legal analysis</text>

  <!-- CRITICAL tier -->
  <rect x="60" y="100" width="800" height="85" rx="6" fill="#0d1225" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="60" y="100" width="800" height="4" rx="2" fill="#e74c3c"/>
  <text x="80" y="125" fill="#e74c3c" font-size="12" font-weight="700">CRITICAL</text>
  <text x="160" y="120" fill="#e74c3c" font-size="10" font-weight="600">+ 100% Judge coverage + all-significant HITL + PACE</text>
  <text x="160" y="135" fill="#8899aa" font-size="9">Multi-layer guardrails | Confidence thresholds | Citation required | 1h review SLA | 7-yr immutable logs</text>
  <text x="160" y="150" fill="#8899aa" font-size="9">Full Arts. 9-15 compliance | GDPR Art. 22 alignment | Monthly PACE drills | Circuit breaker + kill switch</text>
  <text x="160" y="165" fill="#8899aa" font-size="9">Override capability mandatory | Reviewer independence enforced | Bias monitoring active</text>
  <text x="160" y="178" fill="#667" font-size="9">Every output is evaluated. Every significant decision has a human. Full audit trail for regulators.</text>
  <text x="700" y="152" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="600">Credit, fraud, medical, autonomous agents</text>

  <!-- Left bracket showing cumulative -->
  <line x1="45" y1="430" x2="45" y2="115" stroke="#ff6b35" stroke-width="1.5"/>
  <line x1="45" y1="430" x2="55" y2="430" stroke="#ff6b35" stroke-width="1.5"/>
  <line x1="45" y1="115" x2="55" y2="115" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="40" y="280" fill="#ff6b35" font-size="9" font-weight="600" transform="rotate(-90, 40, 280)">CUMULATIVE</text>

  <!-- Footer -->
  <rect x="60" y="487" width="800" height="25" rx="4" fill="#0a1018" stroke="#333" stroke-width="0.5"/>
  <text x="460" y="504" text-anchor="middle" fill="#556" font-size="9">A CRITICAL system runs every control from NONE through HIGH, plus its own. Nothing is skipped. Nothing is replaced.</text>
</svg>
