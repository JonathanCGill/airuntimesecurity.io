site_name: AI Runtime Security
site_url: https://airuntimesecurity.io/
site_description: >-
  AI Runtime Security (AIRS) | the discipline of monitoring, controlling,
  and constraining AI system behaviour in production environments.
site_author: Jonathan Gill

edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.prune
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.follow
  favicon: images/favicon.svg
  icon: {}

plugins:
  - search
  - meta

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-MTNR4PST40
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonathanCGill
      name: Jonathan Gill on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jonathancgill/
      name: Jonathan Gill on LinkedIn

copyright: >-
  Copyright &copy; 2026 Jonathan Gill | MIT License<br>
  Feedback welcome | <a href="mailto:feedback@airuntimesecurity.io">feedback@airuntimesecurity.io</a>

